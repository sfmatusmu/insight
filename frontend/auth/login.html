<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO & Security Meta Tags -->
    <meta name="description" content="Inicia sesión en la plataforma de Insight360. Accede a tu panel de control, dashboards analíticos y reportes automatizados.">
    <meta name="keywords" content="login, iniciar sesión, Insight360, acceso, Business Intelligence, dashboard, IA corporativa">
    <meta name="author" content="Insight360">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Iniciar Sesión | Insight360">
    <meta property="og:description" content="Accede a tu panel de control y reportes centralizados de Insight360.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <title>Iniciar Sesión | Insight360</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-dark">

    <!-- Navegación Minimalista -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav" style="padding-top: 0.8rem; padding-bottom: 0.8rem; background-color: rgba(10, 17, 40, 0.95); backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold m-0" href="../index.html">
                <i class="bi bi-hexagon-fill text-accent me-2"></i>Insight360
            </a>
            <div>
                <a class="btn btn-outline-light rounded-pill px-4 py-2" href="../index.html">
                    <i class="bi bi-arrow-left me-2"></i>Volver
                </a>
            </div>
        </div>
    </nav>

    <!-- Contenido de Inicio de Sesión -->
    <section class="flex-grow-1 d-flex align-items-center position-relative py-5 mt-5" style="background-color: var(--dark-bg); overflow: hidden;">
        <!-- Elementos Decorativos -->
        <div class="glass-orb shape-1" style="width: 500px; height: 500px; top: -100px; right: -100px; animation-duration: 6s;"></div>
        <div class="glass-orb shape-2" style="width: 400px; height: 400px; bottom: -100px; left: -100px; background-color: rgba(0, 102, 255, 0.2); animation-duration: 5s;"></div>
        
        <div class="container position-relative z-index-1 fade-in-up visible">
            <div class="row justify-content-center">
                <div class="col-md-7 col-lg-5">
                    <div class="glassmorphism p-5 rounded-4 shadow-lg border border-secondary" style="background: rgba(10, 17, 40, 0.6);">
                        <div class="text-center mb-4">
                            <i class="bi bi-shield-lock-fill display-4 text-accent mb-3 d-inline-block"></i>
                            <h2 class="fw-bold text-white mb-2">Iniciar Sesión</h2>
                            <p class="text-white-50">Accede a tus reportes y panel de control.</p>
                        </div>
                        
                        <form id="loginForm" novalidate>
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control glass-input fw-semibold" id="email" placeholder="nombre@ejemplo.com" required>
                                <label for="email">Correo Electrónico</label>
                                <div class="invalid-feedback">Por favor ingresa un correo electrónico válido.</div>
                            </div>
                            
                            <div class="mb-3 position-relative">
                                <div class="form-floating input-group has-validation">
                                    <input type="password" class="form-control glass-input fw-semibold border-end-0" id="password" placeholder="Contraseña" required minlength="8" style="border-radius: var(--bs-border-radius) 0 0 var(--bs-border-radius);">
                                    <label for="password" style="z-index: 5;">Contraseña</label>
                                    <button class="btn glass-input border-start-0 text-white-50 px-3 d-flex align-items-center" type="button" id="togglePassword" style="border-radius: 0 var(--bs-border-radius) var(--bs-border-radius) 0; border-left: none !important; margin-left: -1px;">
                                        <i class="bi bi-eye-fill" id="toggleIcon"></i>
                                    </button>
                                    <div class="invalid-feedback">La contraseña debe tener al menos 8 caracteres.</div>
                                </div>
                                <!-- Password Strength Meter -->
                                <div class="password-strength-container mt-2 d-none" id="pwdStrengthContainer">
                                    <div class="d-flex justify-content-between align-items-center mb-1">
                                        <small class="text-white-50" style="font-size: 0.75rem;">Seguridad de la contraseña</small>
                                        <small class="fw-bold" id="pwdStrengthText" style="font-size: 0.75rem;">Débil</small>
                                    </div>
                                    <div class="progress" style="height: 4px; background-color: rgba(255,255,255,0.1);">
                                        <div class="progress-bar" id="pwdStrengthBar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center mb-4 gap-2">
                                <div class="form-check">
                                    <input class="form-check-input border-secondary" type="checkbox" id="rememberMe" style="background-color: transparent;">
                                    <label class="form-check-label text-white-50" for="rememberMe">
                                        Guardar mi correo
                                    </label>
                                </div>
                                <a href="recuperar.html" class="text-accent text-decoration-none fw-semibold pt-1 pt-sm-0">¿Olvidaste tu contraseña?</a>
                            </div>
                            
                            <div class="d-grid mt-2 mb-3">
                                <button class="btn btn-accent btn-lg text-uppercase rounded-pill fw-bold py-3 shadow" type="submit">Ingresar</button>
                            </div>
                            
                            <!-- Contenedor de mensajes de autenticación -->
                            <div id="authMessage" class="d-none mt-3 p-3 rounded-3 text-center small fw-semibold"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer minificado -->
    <footer class="footer py-4 mt-auto" style="border-top: 1px solid rgba(255,255,255,0.05); background-color: #030408;">
        <div class="container text-center">
            <p class="text-white-50 mb-0 small">&copy; <span id="year">2026</span> Insight360. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <!-- Scripts de API y Autenticación -->
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
</body>
</html>
