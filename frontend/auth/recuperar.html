<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO & Security Meta Tags -->
    <meta name="description" content="Recupera la contraseña de tu cuenta de Insight360. Restablece el acceso a tus herramientas de Business Intelligence y dashboards.">
    <meta name="keywords" content="recuperar contraseña, password recovery, Insight360, acceso, restablecer contraseña">
    <meta name="author" content="Insight360">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Recuperar Contraseña | Insight360">
    <meta property="og:description" content="Instrucciones seguras para restablecer el acceso a tu plataforma.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <title>Recuperar Contraseña | Insight360</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-dark">

    <!-- Navegación Minimalista -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav" style="padding-top: 0.8rem; padding-bottom: 0.8rem; background-color: rgba(10, 17, 40, 0.95); backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold m-0" href="../index.html">
                <i class="bi bi-hexagon-fill text-accent me-2"></i>Insight360
            </a>
            <div>
                <a class="btn btn-outline-light rounded-pill px-4 py-2" href="login.html">
                    <i class="bi bi-arrow-left me-2"></i>Volver al Login
                </a>
            </div>
        </div>
    </nav>

    <!-- Contenido de Recuperación -->
    <section class="flex-grow-1 d-flex align-items-center position-relative py-5 mt-5" style="background-color: var(--dark-bg); overflow: hidden;">
        <!-- Elementos Decorativos -->
        <div class="glass-orb shape-1" style="width: 550px; height: 550px; top: -120px; right: -150px; background: radial-gradient(circle, var(--accent-color) 0%, rgba(0,0,0,0) 60%);"></div>
        
        <div class="container position-relative z-index-1 fade-in-up visible">
            <div class="row justify-content-center">
                <div class="col-md-7 col-lg-5">
                    <div class="glassmorphism p-5 rounded-4 shadow-lg border border-secondary" style="background: rgba(10, 17, 40, 0.6);">
                        <div class="text-center mb-4">
                            <i class="bi bi-key-fill display-4 text-gradient mb-3 d-inline-block"></i>
                            <h2 class="fw-bold text-white mb-2">Recuperar Acceso</h2>
                            <p class="text-white-50">Ingresa tu correo y te enviaremos las instrucciones de recuperación.</p>
                        </div>
                        
                        <form id="recoveryForm" novalidate>
                            <div class="form-floating mb-4">
                                <input type="email" class="form-control glass-input fw-semibold" id="recoveryEmail" placeholder="nombre@ejemplo.com" required>
                                <label for="recoveryEmail">Correo Electrónico Registrado</label>
                                <div class="invalid-feedback">Por favor ingresa tu correo electrónico registrado.</div>
                            </div>
                            
                            <div class="d-grid mt-2 mb-4">
                                <button class="btn btn-accent btn-lg text-uppercase rounded-pill fw-bold py-3 shadow" type="submit">Enviar Enlace</button>
                            </div>
                            
                            <!-- Contenedor de mensajes de recuperación -->
                            <div id="recoveryMessage" class="d-none mt-3 p-3 rounded-3 text-center small fw-semibold"></div>
                            
                            <div class="text-center mt-3 pt-2 border-top border-secondary">
                                <span class="text-white-50">¿Recordaste tu contraseña? </span>
                                <a href="login.html" class="text-accent text-decoration-none fw-semibold dropdown-item d-inline">Inicia Sesión</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer minificado -->
    <footer class="footer py-4 mt-auto" style="border-top: 1px solid rgba(255,255,255,0.05); background-color: #030408;">
        <div class="container text-center">
            <p class="text-white-50 mb-0 small">&copy; <span id="year">2026</span> Insight360. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <!-- Scripts de API y Autenticación -->
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
</body>
</html>
